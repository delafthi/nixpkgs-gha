name: Update package
on:
  workflow_call:
    inputs:
      package:
        description: "Package to update"
        required: true
        type: string
      nixpkgs-repo:
        description: The nixpkgs repository to target (e.g., NixOS/nixpkgs)
        required: true
        type: string
      nixpkgs-fork:
        description: Your fork of nixpkgs to push changes to (falls back to NIXPKGS_FORK variable)
        required: false
        type: string
        default: ""
      skip-if-pr-exists:
        description: Skip update if an open PR already exists for this package
        type: boolean
        required: false
        default: true
      nixpkgs-review-gha:
        description: Trigger external nixpkgs-review-gha workflow after successful update
        required: false
        type: boolean
        default: false
      nixpkgs-review-gha-repo:
        description: Your fork of nixpkgs-review-gha to trigger external review (e.g., "yourname/nixpkgs-review-gha")
        required: false
        type: string
      nixpkgs-review-gha-workflow:
        description: Workflow filename in nixpkgs-review-gha repo
        required: false
        type: string
        default: review.yml

# Prevent concurrent updates of the same package
concurrency:
  group: update-package-${{ inputs.package }}-${{ inputs.nixpkgs-repo }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate configuration
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "::error::GH_TOKEN secret is required but not set"
            exit 1
          fi

          fork="${{ inputs.nixpkgs-fork || vars.NIXPKGS_FORK }}"
          if [ -z "$fork" ]; then
            echo "::error::NIXPKGS_FORK must be provided via input or repository variable"
            exit 1
          fi
          echo "NIXPKGS_FORK=$fork" >> "$GITHUB_ENV"

          if ! echo "${{ inputs.package }}" | grep -qE '^[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid package name: ${{ inputs.package }}"
            exit 1
          fi

      - name: Check if PR exists
        id: find-prs
        if: ${{ inputs.skip-if-pr-exists == true }}
        run: |
          pkg_escaped=$(echo "${{ inputs.package }}" | sed 's/[.[\*^$()+?{|]/\\&/g')

          matches=$(gh pr list --repo ${{ inputs.nixpkgs-repo }} --state open --json number,title \
            | jq -c --arg pkg "$pkg_escaped" 'map(select(.title | test("^" + $pkg + ":"; "i")))')

          count=$(jq 'length' <<<"$matches")
          if [ "$count" -gt 0 ]; then
            numbers=$(jq -r 'map(.number)|join(", ")' <<<"$matches")
            echo "::warning::Skipping ${{ inputs.package }} - existing PR(s): #$numbers"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Checkout nixpkgs
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: ${{ inputs.nixpkgs-repo }}

      - name: Configure Git
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup Magic Nix Cache
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run nix-update
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        run: |
          nix-shell maintainers/scripts/update.nix \
            --argstr package ${{ inputs.package }} \
            --argstr commit true

      - name: Run nixpkgs-review
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        id: nixpkgs-review
        run: |
          commit=$(git rev-parse HEAD)
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

          system=$(nix eval --impure --raw --expr 'builtins.currentSystem')
          echo "system=$system" >> "$GITHUB_OUTPUT"

          nix run nixpkgs#nixpkgs-review -- rev "$commit" --no-shell

          cache_dir="$HOME/.cache/nixpkgs-review/rev-$commit"
          if [ -f "$cache_dir/report.md" ]; then
            {
              echo "report<<EOF"
              cat "$cache_dir/report.md"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "report=" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Push changes and create PR
        if: ${{ steps.find-prs.outputs.found != 'true' }}
        id: create-pr
        run: |
          branch="auto-update/${{ inputs.package }}"
          title=$(git log -1 --format=%s)

          git checkout -b "$branch"
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/${{ env.NIXPKGS_FORK }}.git" 2>/dev/null || \
            git remote set-url fork "https://x-access-token:${GH_TOKEN}@github.com/${{ env.NIXPKGS_FORK }}.git"
          git push -f fork "$branch"

          {
            echo "Automatic update generated by [nixpkgs-update-gha](https://github.com/delafthi/nixpkgs-update-gha)."
            echo ""
            echo "---"
            echo ""
            echo "## \`nixpkgs-review\` result"
            echo ""
            echo "**Command:** \`nixpkgs-review rev ${{ steps.nixpkgs-review.outputs.commit }}\`"
            echo "**Commit:** [\`${{ steps.nixpkgs-review.outputs.commit }}\`](https://github.com/${{ inputs.nixpkgs-repo }}/commit/${{ steps.nixpkgs-review.outputs.commit }})"
            echo "**System:** \`${{ steps.nixpkgs-review.outputs.system }}\`"
            echo "**Logs:** https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "${{ steps.nixpkgs-review.outputs.report }}"
          } > pr-body.md

          pr_url=$(gh pr create \
            --repo "${{ inputs.nixpkgs-repo }}" \
            --head "${{ env.NIXPKGS_FORK }}:$branch" \
            --title "$title" \
            --body-file pr-body.md \
            --label "automated-update" \
            --label "${{ inputs.package }}")

          pr_number=$(echo "$pr_url" | grep -oE '[0-9]+$')
          echo "pull-request-number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "pull-request-url=$pr_url" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Trigger nixpkgs-review-gha
        if: ${{ steps.find-prs.outputs.found != 'true' && steps.create-pr.outputs.pull-request-number != '' && inputs.nixpkgs-review-gha == true && inputs.nixpkgs-review-gha-repo != '' }}
        run: |
          gh workflow run "${{ inputs.nixpkgs-review-gha-workflow }}" \
            --repo "${{ inputs.nixpkgs-review-gha-repo }}" \
            --field pr="${{ steps.create-pr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
